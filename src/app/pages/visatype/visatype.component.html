<div class="card shadow-sm">
  <div class="container-fluid p-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="fw-semibold mb-0">
        <i class="fa-solid fa-passport me-2 text-primary"></i>
        Visa Type Management
      </h4>

      <div class="d-flex gap-2">
        <!-- Export -->
        <div class="dropdown">
          <button class="btn btn-outline-dark dropdown-toggle" data-bs-toggle="dropdown">
            <i class="fa-solid fa-download me-2"></i> Export
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" (click)="exportAs('pdf')">Download PDF</a></li>
            <li><a class="dropdown-item" (click)="exportAs('excel')">Download Excel</a></li>
          </ul>
        </div>

        <!-- Upload -->
        <button class="btn btn-primary" (click)="openUploadPopup()">
          <i class="fa-solid fa-upload me-2"></i> Bulk Upload
        </button>
      </div>
    </div>

    <hr />

    <!-- Form -->
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <form (ngSubmit)="onSubmit()" #visaForm="ngForm">

          <div class="row g-3">

            <!-- Visa Type Name -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Visa Type Name</label>
              <input type="text" class="form-control"
                     name="visaTypeName"
                     [(ngModel)]="visa.visaTypeName"
                     required />
            </div>
            <div class="col-md-6">
            <label class="form-label fw-semibold">Description</label>
            <input type="text"
                    class="form-control"
                    name="description"
                    [(ngModel)]="visa.description"
                    placeholder="Enter Description" />
            </div>

            <!-- Company -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Company</label>
              <select class="form-select"
                      name="companyId"
                      [(ngModel)]="visa.companyId" (change)="onCompanyChange()"
                      required>
                <option value="">Select Company</option>
                <option *ngFor="let c of companies" [ngValue]="c.companyId">
                  {{ c.companyName }}
                </option>
              </select>
            </div>

            <!-- Region -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Region</label>
              <select class="form-select"
                      name="regionId"
                      [(ngModel)]="visa.regionId" [disabled]="!visa.companyId"
                      required>
                <option value="">Select Region</option>
                <option *ngFor="let r of filteredRegions" [ngValue]="r.regionId">
                  {{ r.regionName }}
                </option>
              </select>
            </div>

            <!-- Status -->
            <div class="col-md-6 d-flex align-items-center">
              <div class="form-check form-switch mt-3">
                <input class="form-check-input"
                       type="checkbox"
                       name="isActive"
                       [(ngModel)]="visa.isActive" />
                <label class="form-check-label ms-2">
                  {{ visa.isActive ? 'Active' : 'Inactive' }}
                </label>
              </div>
            </div>

            <!-- Submit -->
            <div class="col-md-2 d-flex align-items-end">
              <button class="btn btn-dark w-100"
                      [disabled]="!visaForm.valid">
                {{ isEditMode ? 'Update' : 'Save' }}
              </button>
            </div>

          </div>
        </form>
      </div>
    </div>

    <!-- Table -->
    <div class="card shadow-sm">
      <div class="card-body">

        <!-- Filters -->
        <div class="row g-3 mb-3">
          <div class="col-md-4">
            <input class="form-control"
                   placeholder="Search Visa Type"
                   [(ngModel)]="searchText" />
          </div>

          <div class="col-md-4">
            <select class="form-select" [(ngModel)]="statusFilter">
              <option value="">All</option>
              <option [ngValue]="true">Active</option>
              <option [ngValue]="false">Inactive</option>
            </select>
          </div>
        </div>

        <!-- Table -->
        <table class="table table-bordered table-hover">
          <thead>
            <tr>
              <th>#</th>
              <th>Visa Type</th>
              <th>Company</th>
              <th>Region</th>
              <th>Description</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let v of pagedVisaTypes; let i = index">
              <td>{{ (currentPage - 1) * pageSize + i + 1 }}</td>
              <td>{{ v.visaTypeName }}</td>
              <td>{{ v.companyName }}</td>
              <td>{{ v.regionName }}</td>
              <td>{{ v.description }}</td>
              <td>
                <span class="badge"
                      [ngClass]="v.isActive ? 'bg-success':'bg-secondary'">
                  {{ v.isActive ? 'Active':'Inactive' }}
                </span>
              </td>

              <td>
                <button class="btn btn-sm btn-primary me-2"
                        (click)="editVisa(v)">Edit</button>
                <button class="btn btn-sm btn-danger"
                        (click)="deleteVisa(v)">Delete</button>
              </td>
            </tr>
          </tbody>
        </table>

      </div>
    </div>

  </div>
</div>
